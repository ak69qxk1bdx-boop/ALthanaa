<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التحاضير اليومية لطلبة الثناء</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #06b6d4;
            --accent-hover: #0891b2;
            --danger-color: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0; 
            color: var(--text-color);
            background-image: radial-gradient(circle at top right, rgba(6, 182, 212, 0.1), transparent), radial-gradient(circle at bottom left, rgba(15, 23, 42, 0.8), #0f172a);
            background-attachment: fixed;
        }

        header { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white; 
            text-align: center; 
            padding: 35px 15px; 
            position: relative; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(6, 182, 212, 0.3);
        }

        header p {
            margin: 8px 0 0 0;
            color: #94a3b8;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .admin-login-btn { 
            position: absolute; 
            top: 30px; 
            left: 20px; 
            background: rgba(239, 68, 68, 0.2); 
            color: #f87171; 
            border: 1px solid rgba(239, 68, 68, 0.4); 
            padding: 8px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease;
        }
        .admin-login-btn:hover {
            background: var(--danger-color);
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .tab-container { 
            display: flex; 
            justify-content: center; 
            margin: 30px auto; 
            max-width: 400px; 
            background: rgba(30, 41, 59, 0.5); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 99s9px; 
            padding: 6px; 
            gap: 5px; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 14px; 
            border: none; 
            background: transparent; 
            font-size: 16px; 
            font-weight: bold; 
            color: #94a3b8;
            cursor: pointer; 
            border-radius: 999px; 
            white-space: nowrap; 
            transition: all 0.3s ease;
        }
        .tab-btn.active { 
            background-color: var(--accent-color); 
            color: #0f172a; 
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.4);
        }

        .content-section { display: none; max-width: 700px; margin: 0 auto; padding: 0 20px 40px 20px; }
        .content-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lesson-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin-bottom: 30px; 
            padding: 20px; 
            text-align: center; 
            position: relative; 
            transition: transform 0.3s ease;
        }
        .lesson-card h3 { margin: 0 0 10px 0; font-size: 20px; color: #fff; }
        .lesson-card img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 12px; 
            margin: 15px 0; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .time-bar { 
            background-color: rgba(6, 182, 212, 0.1); 
            color: var(--accent-color); 
            padding: 6px 14px; 
            border-radius: 999px; 
            font-size: 13px; 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .download-btn { 
            display: inline-block; 
            background-color: transparent; 
            color: var(--accent-color); 
            border: 1px solid var(--accent-color);
            padding: 12px 24px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background-color: var(--accent-color);
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .delete-btn { 
            display: none; 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background-color: rgba(239, 68, 68, 0.2); 
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3); 
            padding: 6px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .delete-btn:hover { background: var(--danger-color); color: white; }

        #admin-panel { 
            display: none; 
            background: #1e293b; 
            max-width: 450px; 
            margin: 30px auto; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.4s ease;
        }
        #admin-panel h2 { margin-top: 0; font-size: 22px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px; 
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent-color); outline: none; }
        
        .submit-btn { 
            background: var(--accent-color); 
            color: #0f172a; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold; 
            transition: background 0.3s ease;
        }
        .submit-btn:hover { background: var(--accent-hover); }
        .submit-btn:disabled { background-color: #475569; color: #94a3b8; cursor: not-allowed; }
        .no-lessons { text-align: center; color: #64748b; font-style: italic; font-size: 15px; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <button class="admin-login-btn" id="login-toggle-btn" onclick="loginAdmin()">دخول الأدمن 🔐</button>
        <h1>منصة التحاضير اليومية لطلبة الثناء</h1>
        <p>الصفوف الذهبية للسادس علمي</p>
    </header>

    <div id="admin-panel">
        <h2 style="color: var(--accent-color);">لوحة تحكم الأستاذ 🛠️</h2>
        <div class="form-group">
            <label>عنوان التحضير:</label>
            <input type="text" id="lesson-title" placeholder="اكتب العنوان هنا...">
        </div>
        <div class="form-group">
            <label>اختر صورة التحضير: 📁</label>
            <input type="file" id="lesson-file" accept="image/*">
        </div>
        <div class="form-group">
            <label>اختر الصف والشعبة:</label>
            <select id="lesson-class">
                <option value="a">السادس (أ)</option>
                <option value="b">السادس (ب)</option>
            </select>
        </div>
        <button class="submit-btn" id="upload-btn" onclick="publishLesson()">نشر التحضير الآن أونلاين ✨</button>
        <button onclick="logoutAdmin()" style="margin-top:15px; background:transparent; border: 1px solid #475569; color:#94a3b8; mountaineering:none; width:100%; padding:8px; border-radius:8px; cursor:pointer;">خروج</button>
    </div>

    <div class="tab-container">
        <button id="btn-a" class="tab-btn active" onclick="switchTab('a')">السادس (أ)</button>
        <button id="btn-b" class="tab-btn" onclick="switchTab('b')">السادس (ب)</button>
    </div>

    <div id="area-a" class="content-section active"></div>
    <div id="area-b" class="content-section"></div>

    <script>
        const ADMIN_PASSWORD = "10102020";
        let isAdminActive = false;

        // إعدادات السيرفر السريع أونلاين
        const SUPABASE_URL = "https://wkgtbwxlwshunwexwzyp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZ3Rid3hsd3NodW53ZXh3enlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTYyMzE0MDksImV4cCI6MjAzMTgwNzQwOX0.7l-b5-rI8fHn6Jt3XJbH8tD_9Z-bH-eF1jX7bH_9Z-b";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function loginAdmin() {
            let password = prompt("الرجاء إدخال كلمة سر الأدمن:");
            if (password === ADMIN_PASSWORD) {
                isAdminActive = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('login-toggle-btn').style.display = 'none';
                renderLessonsUI(); 
            } else { alert("خطأ!"); }
        }

        function logoutAdmin() {
            isAdminActive = false;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('login-toggle-btn').style.display = 'block';
            renderLessonsUI(); 
        }

        async function publishLesson() {
            let title = document.getElementById('lesson-title').value;
            let fileInput = document.getElementById('lesson-file');
            let targetClass = document.getElementById('lesson-class').value;
            let submitBtn = document.getElementById('upload-btn');

            if (title === "" || fileInput.files.length === 0) {
                alert("الرجاء ملء البيانات واختيار صورة!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "جاري النشر السريع أونلاين... ⏳";

            let file = fileInput.files[0];
            let fileName = Date.now() + "_" + file.name;

            try {
                let { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('lessons_images')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                let { data: urlData } = _supabase.storage
                    .from('lessons_images')
                    .getPublicUrl(fileName);

                let imageUrl = urlData.publicUrl;

                let { error: dbError } = await _supabase
                    .from('lessons')
                    .insert([{ title: title, img: imageUrl, class: targetClass, created_at: new Date() }]);

                if (dbError) throw dbError;

                alert("تم النشر أونلاين لجميع الهواتف بنجاح! 🎉");
                document.getElementById('lesson-title').value = "";
                fileInput.value = "";
                loadLessons();
            } catch (error) {
                alert("حدث خطأ أثناء النشر، تأكد من الاتصال بالشبكة.");
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "نشر التحضير الآن ✨";
            }
        }

        async function loadLessons() {
            try {
                let { data, error } = await _supabase
                    .from('lessons')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                window.globalLessons = data || [];
                renderLessonsUI();
            } catch (e) {
                console.error(e);
            }
        }

        async function deleteLesson(id) {
            if (confirm("حذف التحضير نهائياً من أجهزة الكل؟")) {
                let { error } = await _supabase
                    .from('lessons')
                    .delete()
                    .eq('id', id);

                if (!error) loadLessons();
                else alert("عذراً، فشل الحذف أونلاين.");
            }
        }

        function formatUploadTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            let hours = date.getHours();
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
            hours = hours % 12 || 12;
            const timeString = `${hours}:${minutes} ${ampm}`;
            if (date.toDateString() === now.toDateString()) return `📅 نُشر اليوم في الـ ${timeString}`;
            return `📅 نُشر بتاريخ: ${date.getDate()}/${date.getMonth() + 1} في الـ ${timeString}`;
        }

        function renderLessonsUI() {
            let areaA = document.getElementById('area-a');
            let areaB = document.getElementById('area-b');
            areaA.innerHTML = ""; areaB.innerHTML = "";
            let countA = 0; let countB = 0;
            let deleteStyle = isAdminActive ? "style='display: block;'" : "";
            let list = window.globalLessons || [];

            list.forEach(lesson => {
                let card = `
                    <div class="lesson-card">
                        <button class="delete-btn" ${deleteStyle} onclick="deleteLesson('${lesson.id}')">حذف 🗑️</button>
                        <h3>${lesson.title}</h3>
                        <div class="time-bar">${formatUploadTime(lesson.created_at)}</div>
                        <br>
                        <img src="${lesson.img}" loading="lazy">
                        <br>
                        <a href="${lesson.img}" target="_blank" class="download-btn">عرض وتحميل التحضير 📥</a>
                    </div>
                `;
                if (lesson.class === 'a') { areaA.innerHTML += card; countA++; }
                else { areaB.innerHTML += card; countB++; }
            });

            if(countA === 0) areaA.innerHTML = "<p class='no-lessons'>لا توجد تحاضير مرفوعة للسادس (أ) حالياً.</p>";
            if(countB === 0) areaB.innerHTML = "<p class='no-lessons'>لا توجد تحاضير مرفوعة للسادس (ب) حالياً.</p>";
        }

        function switchTab(classType) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (classType === 'a') {
                document.getElementById('area-a').classList.add('active');
                document.getElementById('btn-a').classList.add('active');
            } else {
                document.getElementById('area-b').classList.add('active');
                document.getElementById('btn-b').classList.add('active');
            }
        }

        window.addEventListener('DOMContentLoaded', loadLessons);
    </script>
</body>
</html>
